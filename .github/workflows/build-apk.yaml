name: Build Nalamudan APK

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL (leave blank for default)'
        required: false
        default: 'https://ai-health-tracker-yycb.onrender.com'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform tools
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>/dev/null || true
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline 2>/dev/null || npm install

      - name: Build React Vite app
        working-directory: frontend
        env:
          VITE_API_URL: ${{ github.event.inputs.api_url || secrets.VITE_API_URL || 'https://ai-health-tracker-yycb.onrender.com' }}
          NODE_ENV: production
        run: |
          npm run build
          echo "Vite build complete"

      - name: Setup Capacitor Android project
        working-directory: frontend
        run: |
          rm -rf android
          npx cap init Nalamudan com.nalamudan.healthtracker --web-dir=dist 2>/dev/null || true
          npx cap add android
          echo "Capacitor android project created"

      - name: Sync Capacitor assets
        working-directory: frontend
        run: |
          npx cap sync android
          echo "Capacitor sync complete"

      - name: Install Nalamudan app icons
        run: |
          RES="frontend/android/app/src/main/res"
          for folder in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$RES/$folder"
            src="frontend/public/icons/$folder/ic_launcher.png"
            if [ -f "$src" ]; then
              cp "$src" "$RES/$folder/ic_launcher.png"
              cp "$src" "$RES/$folder/ic_launcher_round.png"
            elif [ -f "frontend/public/android-chrome-192x192.png" ]; then
              cp frontend/public/android-chrome-192x192.png "$RES/$folder/ic_launcher.png"
              cp frontend/public/android-chrome-192x192.png "$RES/$folder/ic_launcher_round.png"
            fi
          done
          echo "Icons installed"

      - name: Install splash screen
        run: |
          RES="frontend/android/app/src/main/res"
          mkdir -p "$RES/drawable"
          if [ -f "frontend/public/icons/splash.png" ]; then
            cp frontend/public/icons/splash.png "$RES/drawable/splash.png"
          fi
          echo "Splash screen installed"

      - name: Write Android resource files
        run: |
          python3 << 'PYEOF'
          import os

          RES = "frontend/android/app/src/main/res"
          os.makedirs(f"{RES}/values", exist_ok=True)
          os.makedirs(f"{RES}/xml", exist_ok=True)

          files = {}

          files[f"{RES}/values/strings.xml"] = (
              '<?xml version="1.0" encoding="utf-8"?>\n'
              '<resources>\n'
              '    <string name="app_name">Nalamudan</string>\n'
              '    <string name="title_activity_main">Nalamudan</string>\n'
              '    <string name="custom_url_scheme">nalamudan</string>\n'
              '</resources>\n'
          )

          files[f"{RES}/values/colors.xml"] = (
              '<?xml version="1.0" encoding="utf-8"?>\n'
              '<resources>\n'
              '    <color name="colorPrimary">#1A237E</color>\n'
              '    <color name="colorPrimaryDark">#0D1757</color>\n'
              '    <color name="colorAccent">#00E5A0</color>\n'
              '    <color name="ic_launcher_background">#1A237E</color>\n'
              '    <color name="splash_background">#1A237E</color>\n'
              '</resources>\n'
          )

          files[f"{RES}/values/styles.xml"] = (
              '<?xml version="1.0" encoding="utf-8"?>\n'
              '<resources>\n'
              '    <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">\n'
              '        <item name="colorPrimary">@color/colorPrimary</item>\n'
              '        <item name="colorPrimaryDark">@color/colorPrimaryDark</item>\n'
              '        <item name="colorAccent">@color/colorAccent</item>\n'
              '        <item name="android:windowBackground">@color/splash_background</item>\n'
              '    </style>\n'
              '    <style name="AppTheme.NoActionBarLaunch" parent="AppTheme">\n'
              '        <item name="android:windowBackground">@color/splash_background</item>\n'
              '        <item name="android:windowFullscreen">true</item>\n'
              '    </style>\n'
              '</resources>\n'
          )

          files[f"{RES}/xml/network_security_config.xml"] = (
              '<?xml version="1.0" encoding="utf-8"?>\n'
              '<network-security-config>\n'
              '    <domain-config cleartextTrafficPermitted="false">\n'
              '        <domain includeSubdomains="true">ai-health-tracker-yycb.onrender.com</domain>\n'
              '    </domain-config>\n'
              '    <base-config cleartextTrafficPermitted="false">\n'
              '        <trust-anchors>\n'
              '            <certificates src="system"/>\n'
              '        </trust-anchors>\n'
              '    </base-config>\n'
              '</network-security-config>\n'
          )

          for path, content in files.items():
              with open(path, "w") as f:
                  f.write(content)
              print(f"Written: {path}")

          PYEOF

      - name: Write AndroidManifest.xml
        run: |
          python3 << 'PYEOF'
          content = (
              '<?xml version="1.0" encoding="utf-8"?>\n'
              '<manifest xmlns:android="http://schemas.android.com/apk/res/android"\n'
              '    package="com.nalamudan.healthtracker">\n'
              '\n'
              '    <uses-permission android:name="android.permission.INTERNET" />\n'
              '    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n'
              '\n'
              '    <application\n'
              '        android:allowBackup="true"\n'
              '        android:icon="@mipmap/ic_launcher"\n'
              '        android:roundIcon="@mipmap/ic_launcher_round"\n'
              '        android:label="@string/app_name"\n'
              '        android:supportsRtl="true"\n'
              '        android:theme="@style/AppTheme"\n'
              '        android:networkSecurityConfig="@xml/network_security_config"\n'
              '        android:usesCleartextTraffic="false">\n'
              '\n'
              '        <activity\n'
              '            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"\n'
              '            android:name="com.nalamudan.healthtracker.MainActivity"\n'
              '            android:label="@string/title_activity_main"\n'
              '            android:theme="@style/AppTheme.NoActionBarLaunch"\n'
              '            android:launchMode="singleTask"\n'
              '            android:exported="true"\n'
              '            android:screenOrientation="portrait">\n'
              '            <intent-filter>\n'
              '                <action android:name="android.intent.action.MAIN" />\n'
              '                <category android:name="android.intent.category.LAUNCHER" />\n'
              '            </intent-filter>\n'
              '        </activity>\n'
              '\n'
              '        <provider\n'
              '            android:name="androidx.core.content.FileProvider"\n'
              '            android:authorities="${applicationId}.fileprovider"\n'
              '            android:exported="false"\n'
              '            android:grantUriPermissions="true">\n'
              '            <meta-data\n'
              '                android:name="android.support.FILE_PROVIDER_PATHS"\n'
              '                android:resource="@xml/file_paths" />\n'
              '        </provider>\n'
              '\n'
              '    </application>\n'
              '</manifest>\n'
          )
          with open("frontend/android/app/src/main/AndroidManifest.xml", "w") as f:
              f.write(content)
          print("AndroidManifest.xml written")
          PYEOF

      - name: Write file_paths.xml and MainActivity.java
        run: |
          python3 << 'PYEOF'
          import os

          xml_dir = "frontend/android/app/src/main/res/xml"
          os.makedirs(xml_dir, exist_ok=True)
          with open(f"{xml_dir}/file_paths.xml", "w") as f:
              f.write('<?xml version="1.0" encoding="utf-8"?>\n')
              f.write('<paths xmlns:android="http://schemas.android.com/apk/res/android">\n')
              f.write('    <external-path name="my_images" path="." />\n')
              f.write('    <cache-path name="my_cache_files" path="." />\n')
              f.write('</paths>\n')

          java_dir = "frontend/android/app/src/main/java/com/nalamudan/healthtracker"
          os.makedirs(java_dir, exist_ok=True)
          with open(f"{java_dir}/MainActivity.java", "w") as f:
              f.write('package com.nalamudan.healthtracker;\n\n')
              f.write('import com.getcapacitor.BridgeActivity;\n')
              f.write('import android.os.Bundle;\n\n')
              f.write('public class MainActivity extends BridgeActivity {\n')
              f.write('    @Override\n')
              f.write('    protected void onCreate(Bundle savedInstanceState) {\n')
              f.write('        super.onCreate(savedInstanceState);\n')
              f.write('    }\n')
              f.write('}\n')

          print("file_paths.xml and MainActivity.java written")
          PYEOF

      - name: Configure Gradle
        working-directory: frontend/android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "org.gradle.jvmargs=-Xmx2048m -XX:+UseParallelGC" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "Gradle configured"

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            -Pandroid.injected.testOnly=false
          echo "APK built successfully"

      - name: Rename APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          SRC="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          DEST="frontend/android/app/build/outputs/apk/debug/Nalamudan-v4-${DATE}.apk"
          cp "$SRC" "$DEST"
          SIZE=$(du -sh "$SRC" | cut -f1)
          echo "APK ready: $SIZE"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nalamudan-APK
          path: |
            frontend/android/app/build/outputs/apk/debug/Nalamudan-*.apk
            frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4-${{ github.run_number }}
          name: "Nalamudan - Build ${{ github.run_number }}"
          body: "Nalamudan Health + Wealth Tracker. Backend: https://ai-health-tracker-yycb.onrender.com"
          files: frontend/android/app/build/outputs/apk/debug/Nalamudan-*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          APK="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          echo "## Nalamudan APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App ID | com.nalamudan.healthtracker |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | $(du -sh $APK | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | https://ai-health-tracker-yycb.onrender.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
