name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip -d android-sdk
        mkdir -p android-sdk/cmdline-tools/latest
        mv android-sdk/cmdline-tools/* android-sdk/cmdline-tools/latest/ 2>/dev/null || true
        export ANDROID_SDK_ROOT=$PWD/android-sdk
        echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.0"
    
    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm install
        npm run build
    
    - name: Setup Capacitor
      working-directory: ./frontend
      run: |
        npm install @capacitor/cli @capacitor/android
        
        if [ -d "android" ]; then
          rm -rf android
        fi
        
        npx cap init Nalamudan com.nalamudan.healthtracker --web-dir=dist
        npx cap add android
    
    - name: Create Complete Android Resources
      working-directory: ./frontend/android/app/src/main/res
      run: |
        # Create all necessary directories
        mkdir -p values
        mkdir -p values-v21
        mkdir -p layout
        mkdir -p drawable
        
        # Create strings.xml
        cat > values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Nalamudan</string>
            <string name="title_activity_main">Nalamudan</string>
        </resources>
        EOF
        
        # Create colors.xml
        cat > values/colors.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="colorPrimary">#00e5a0</color>
            <color name="colorPrimaryDark">#00b87d</color>
            <color name="colorAccent">#00e5a0</color>
            <color name="background">#121212</color>
        </resources>
        EOF
        
        # Create styles.xml (main)
        cat > values/styles.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                <item name="colorPrimary">@color/colorPrimary</item>
                <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                <item name="colorAccent">@color/colorAccent</item>
            </style>
            
            <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.DayNight.NoActionBar">
                <item name="colorPrimary">@color/colorPrimary</item>
                <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                <item name="colorAccent">@color/colorAccent</item>
            </style>
            
            <style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">
                <item name="android:background">@color/background</item>
                <item name="android:windowBackground">@drawable/splash</item>
            </style>
        </resources>
        EOF
        
        # Create splash drawable
        cat > drawable/splash.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
            <item android:drawable="@color/background"/>
            <item>
                <bitmap
                    android:gravity="center"
                    android:src="@mipmap/ic_launcher"/>
            </item>
        </layer-list>
        EOF
        
        echo "✅ Android resources created successfully"
    
    - name: Copy App Icons to Android
      run: |
        mkdir -p frontend/android/app/src/main/res/mipmap-mdpi
        mkdir -p frontend/android/app/src/main/res/mipmap-hdpi
        mkdir -p frontend/android/app/src/main/res/mipmap-xhdpi
        mkdir -p frontend/android/app/src/main/res/mipmap-xxhdpi
        mkdir -p frontend/android/app/src/main/res/mipmap-xxxhdpi
        
        # Copy icons (using available files)
        if [ -f "frontend/public/android-chrome-512x512.png" ]; then
          cp frontend/public/android-chrome-512x512.png frontend/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp frontend/public/android-chrome-512x512.png frontend/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
        fi
        
        if [ -f "frontend/public/android-chrome-192x192.png" ]; then
          cp frontend/public/android-chrome-192x192.png frontend/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp frontend/public/android-chrome-192x192.png frontend/android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        fi
        
        # For smaller sizes, use scaled versions of available icons
        if [ -f "frontend/public/favicon-48x48.png" ]; then
          cp frontend/public/favicon-48x48.png frontend/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp frontend/public/favicon-48x48.png frontend/android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp frontend/public/favicon-48x48.png frontend/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp frontend/public/favicon-48x48.png frontend/android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp frontend/public/favicon-48x48.png frontend/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp frontend/public/favicon-48x48.png frontend/android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        fi
        
        echo "✅ Icons copied"
    
    - name: Update AndroidManifest.xml
      working-directory: ./frontend/android/app/src/main
      run: |
        cat > AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.nalamudan.healthtracker">
        
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/AppTheme">
                
                <activity
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                    android:name="com.nalamudan.healthtracker.MainActivity"
                    android:label="@string/title_activity_main"
                    android:theme="@style/AppTheme.NoActionBarLaunch"
                    android:exported="true">
                    
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                
            </application>
        
        </manifest>
        EOF
        echo "✅ AndroidManifest.xml updated"
    
    - name: Update MainActivity.java
      working-directory: ./frontend/android/app/src/main/java/com/nalamudan/healthtracker
      run: |
        mkdir -p com/nalamudan/healthtracker
        cat > com/nalamudan/healthtracker/MainActivity.java << 'EOF'
        package com.nalamudan.healthtracker;
        
        import com.getcapacitor.BridgeActivity;
        
        public class MainActivity extends BridgeActivity {}
        EOF
        echo "✅ MainActivity.java created"
    
    - name: Update API URL
      working-directory: ./frontend
      run: |
        mkdir -p src/services
        cat > src/services/api.js << 'EOF'
        export const API_BASE_URL = '${{ secrets.API_BASE_URL }}'
        
        export async function apiCall(endpoint, options = {}) {
          const url = `${API_BASE_URL}${endpoint}`
          const response = await fetch(url, {
            headers: { 'Content-Type': 'application/json' },
            ...options
          })
          if (!response.ok) throw new Error(`API call failed: ${response.statusText}`)
          return response.json()
        }
        
        export default { API_BASE_URL, apiCall }
        EOF
    
    - name: Sync Capacitor
      working-directory: ./frontend
      run: npx cap sync android
    
    - name: Build APK with Gradle
      working-directory: ./frontend/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Nalamudan-APK
        path: frontend/android/app/build/outputs/apk/debug/*.apk
