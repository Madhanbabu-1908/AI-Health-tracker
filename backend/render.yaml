services:
  - type: web
    name: madhan-health-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
